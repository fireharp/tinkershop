name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: tar.gz
          - runner: macos-15-large
            goos: darwin
            goarch: amd64
            archive: tar.gz
          - runner: macos-15
            goos: darwin
            goarch: arm64
            archive: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            archive: zip
    env:
      CGO_ENABLED: "1"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Windows C toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Add MinGW to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: go test ./...

      - name: Build release asset
        id: asset
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.release-please.outputs.tag_name }}"
          version="${tag#v}"
          suffix="${GOOS}_${GOARCH}"
          package="tinkershop_${version}_${suffix}"
          package_dir="dist/${package}"
          exe=""
          if [ "${GOOS}" = "windows" ]; then
            exe=".exe"
          fi

          mkdir -p "${package_dir}"
          go build -trimpath -ldflags="-s -w" -o "${package_dir}/tinkershop${exe}" ./cmd/tinkershop
          go build -trimpath -ldflags="-s -w" -o "${package_dir}/tinkershopd${exe}" ./cmd/tinkershopd
          cp README.md CHANGELOG.md "${package_dir}/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            asset="dist/${package}.zip"
            (cd dist && 7z a "${package}.zip" "${package}")
          else
            asset="dist/${package}.tar.gz"
            (cd dist && tar -czf "${package}.tar.gz" "${package}")
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${asset}" > "${asset}.sha256"
          else
            shasum -a 256 "${asset}" > "${asset}.sha256"
          fi

          echo "asset=${asset}" >> "${GITHUB_OUTPUT}"

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${{ steps.asset.outputs.asset }}" \
            "${{ steps.asset.outputs.asset }}.sha256" \
            --clobber
